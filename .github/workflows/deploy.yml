name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

env:
  PROJECT_ID: brutiledemo
  REGION: europe-west4
  IMAGE: europe-west4-docker.pkg.dev/brutiledemo/werewolves/werewolves-api:latest
  SERVICE: werewolves-api

jobs:
  # ── Gate: only deploy if CI passed ─────────────────────────────────────────
  gate:
    name: Verify CI passed
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - run: echo "CI passed — proceeding with deploy"

  # ── Build & push backend image ─────────────────────────────────────────────
  # Must run BEFORE Terraform so that when Terraform creates a new Cloud Run
  # revision the :latest tag already points to the freshly-built image.
  build-and-push:
    name: Build & Push Image
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE }} backend/WerewolvesAPI/

      - name: Push Docker image
        run: docker push ${{ env.IMAGE }}

  # ── Infrastructure ───────────────────────────────────────────────────────────
  infrastructure:
    name: Terraform Apply
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve
        env:
          TF_VAR_db_password:              ${{ secrets.DB_PASSWORD }}
          TF_VAR_stripe_secret_key:        ${{ secrets.STRIPE_SECRET_KEY }}
          TF_VAR_stripe_webhook_secret:    ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          TF_VAR_stripe_price_id:          ${{ secrets.STRIPE_PRICE_ID }}
          TF_VAR_tournament_bypass_code:   "SKIPPY"

  # ── Backend ──────────────────────────────────────────────────────────────────
  # Image was already pushed by build-and-push. This step tells Cloud Run to
  # pick up the new image (in case Terraform didn't create a new revision).
  deploy-backend:
    name: Deploy Backend
    needs: infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --quiet

  # ── Frontend ─────────────────────────────────────────────────────────────────
  # Runs in parallel with infrastructure/backend — only needs CI to have passed.
  deploy-frontend:
    name: Deploy Frontend
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/werewolves-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/werewolves-app

      - name: Install MkDocs
        run: pip install mkdocs-material

      - name: Build docs
        run: mkdocs build
        working-directory: docs-src

      - name: Build Angular app
        run: npm run build -- --configuration production
        working-directory: frontend/werewolves-app

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project ${{ env.PROJECT_ID }} --non-interactive
        working-directory: frontend/werewolves-app
