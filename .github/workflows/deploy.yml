name: Deploy

on:
  push:
    branches: [main]

env:
  PROJECT_ID: brutiledemo
  REGION: europe-west4
  IMAGE: europe-west4-docker.pkg.dev/brutiledemo/werewolves/werewolves-api:latest
  SERVICE: werewolves-api

jobs:
  # ── Tests ────────────────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Run backend tests
        run: dotnet test backend/WerewolvesAPI.Tests/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/werewolves-app/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend/werewolves-app

      - name: Run frontend tests
        run: npm test -- --watch=false --browsers=ChromeHeadless
        working-directory: frontend/werewolves-app

  # ── Infrastructure ───────────────────────────────────────────────────────────
  infrastructure:
    name: Terraform Apply
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply -auto-approve
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}

  # ── Backend ──────────────────────────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend
    needs: infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -t ${{ env.IMAGE }} backend/WerewolvesAPI/

      - name: Push Docker image
        run: docker push ${{ env.IMAGE }}

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy ${{ env.SERVICE }} \
            --image ${{ env.IMAGE }} \
            --region ${{ env.REGION }} \
            --project ${{ env.PROJECT_ID }} \
            --quiet

  # ── Frontend ─────────────────────────────────────────────────────────────────
  # Runs in parallel with infrastructure/backend — only needs tests to pass.
  deploy-frontend:
    name: Deploy Frontend
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/werewolves-app/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend/werewolves-app

      - name: Build Angular app
        run: npm run build -- --configuration production
        working-directory: frontend/werewolves-app

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --project ${{ env.PROJECT_ID }} --non-interactive
        working-directory: frontend/werewolves-app
