site_name: Werewolves Developer Docs
site_url: https://werewolves-app-brutiledemo.web.app/docs/
site_description: Developer documentation for the Werewolves companion app
repo_url: https://github.com/pauldendulk/werewolves
repo_name: pauldendulk/werewolves

docs_dir: docs
site_dir: ../frontend/werewolves-app/public/docs

theme:
  name: material
  palette:
    scheme: default
    primary: blue
    accent: blue
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Game Design:
      - Concept & Rules: game-concept.md
      - Screen Inventory: screens.md
  - Technical:
      - Technology Overview: tech-overview.md
      - Architecture: architecture.md
      - Audio Narration: audio.md
  - Developer Guide:
      - Local Development: development.md
      - Deployment: deployment.md
