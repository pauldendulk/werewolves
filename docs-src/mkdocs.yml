site_name: Werewolves Developer Docs
site_url: https://werewolves-app-brutiledemo.web.app/docs/
site_description: Developer documentation for the Werewolves companion app
repo_url: https://github.com/pauldendulk/werewolves
repo_name: pauldendulk/werewolves

docs_dir: docs
site_dir: ../frontend/werewolves-app/public/docs

theme:
  name: material
  palette:
    scheme: default
    primary: blue
    accent: blue
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Overview: index.md
  - Game Design:
      - Terminology: terminology.md
      - Concept & Rules: game-concept.md
      - Phases: phases.md
      - Tournament Mode: tournament.md
  - Technical:
      - Technology Overview: tech-overview.md
      - Architecture: architecture.md
      - Authorization: authorization.md
      - Audio Narration: audio.md
  - Developer Guide:
      - Local Development: development.md
      - Deployment: deployment.md
      - Secret Management: secrets.md
      - Stripe Configuration: stripe.md
